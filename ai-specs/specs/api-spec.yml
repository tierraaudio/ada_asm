openapi: 3.1.0
info:
  title: ADA ASM API
  version: 0.1.0
  description: |
    REST API for ADA ASM. This file is the source of truth for the API
    contract and is regenerated from the FastAPI app's `/openapi.json`
    on every PR that changes `backend/app/api/**`.

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: health
    description: Liveness / readiness probes
  - name: auth
    description: Authentication, refresh, password reset, current user
  - name: components
    description: Component catalogue — CRUD, search, purchases, sync placeholder

paths:
  /api/v1/health:
    get:
      tags: [health]
      summary: Service health check
      description: Unauthenticated probe. Always 200 when reachable.
      operationId: health_health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Issue access + refresh tokens for valid credentials
      description: |
        Returns a uniform 401 (`code: INVALID_CREDENTIALS`) for unknown email,
        wrong password, or inactive user — body is byte-identical across the
        three cases.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/Validation"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate refresh + access tokens
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Revoke the supplied refresh token (idempotent)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogoutRequest" }
      responses:
        "204":
          description: Logged out (or no-op for unknown tokens)

  /api/v1/auth/password-recovery:
    post:
      tags: [auth]
      summary: Send a password-reset link (anti-enumeration)
      description: |
        Always returns 202. Sends an email only if the address matches an
        active user; the response body is identical either way.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordRecoveryRequest" }
      responses:
        "202":
          description: Request accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordRecoveryResponse" }
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/password-reset:
    post:
      tags: [auth]
      summary: Redeem a password-reset token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetRequest" }
      responses:
        "204":
          description: Password updated; all active refresh tokens for the user are revoked.
        "400":
          $ref: "#/components/responses/ResetTokenInvalid"
        "422":
          $ref: "#/components/responses/Validation"

  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Return the currently authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/components:
    get:
      tags: [components]
      summary: List components (paginated, searchable)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: Case-insensitive search over mpn / sku / name / family.
        - in: query
          name: family
          schema: { type: string }
        - in: query
          name: supplier
          schema: { type: string }
        - in: query
          name: tier
          schema: { type: string, enum: ["A+", A, B, C, D] }
        - in: query
          name: nato_score
          schema:
            type: string
            enum: [100_otan, otan, allied_otan, neutral, high_risk, no_otan]
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: Paginated catalogue
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedComponents" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/Validation"
    post:
      tags: [components]
      summary: Create a component
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComponentCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Component" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: "MPN already registered (code: MPN_ALREADY_REGISTERED)"
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          $ref: "#/components/responses/Validation"

  /api/v1/components/{component_id}:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [components]
      summary: Get one component (with active NATO scoring bundle)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ComponentDetail — Component extended with `current_nato_scoring`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComponentDetail" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"
    patch:
      tags: [components]
      summary: Partially update a component (mpn is immutable)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComponentUpdate" }
      responses:
        "200":
          description: Updated component
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Component" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"
        "422":
          $ref: "#/components/responses/Validation"
    delete:
      tags: [components]
      summary: Delete a component (idempotent on missing)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted (or already absent)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/components/{component_id}/stock-events:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: page
        schema: { type: integer, minimum: 1, default: 1 }
      - in: query
        name: page_size
        schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
    get:
      tags: [components]
      summary: Paginated stock event ledger (purchase + consumption, newest first)
      description: |
        Append-only ledger that drives the "Historial de compras" modal. Each row carries
        the full event payload (kind, quantity, occurred_at, notes, plus purchase-only
        fields supplier_id/supplier_name/unit_cost/total_cost/currency and
        consumption-only fields project_id/project_name_snapshot). Supersedes the
        previous `/purchases` endpoint.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated stock events ordered by `occurred_at DESC`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedStockEvents" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"

  /api/v1/components/{component_id}/supplier-prices:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [components]
      summary: Time-series of catalogue prices per (supplier, qty_tier, valid_from)
      description: |
        Drives the "Precios de hoy" table (latest per supplier × tier) and the
        "Histórico de precios" chart (filtered by tier + period on the FE).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of SupplierPrice rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SupplierPrice" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"

  /api/v1/components/{component_id}/supplier-stocks:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [components]
      summary: Time-series of supplier-side stock snapshots per (supplier, snapshot_at)
      description: Drives the "Stock disponible en proveedores" chart.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of SupplierStockSnapshot rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SupplierStockSnapshot" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"

  /api/v1/components/{component_id}/nato-scorings:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [components]
      summary: Full audit trail of NATO scorings for the component (active + archived)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of NatoScoringSummary rows, newest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NatoScoringSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"
    post:
      tags: [components]
      summary: Create a new active scoring (atomically archives the previous active one)
      description: |
        Inserts a new `component_nato_scorings` row with `status='active'`,
        archives the previous active row, replaces classifications/alternatives,
        and updates the component's cached `(nato_score, tier)`. The active
        scoring's full bundle is returned in `current_nato_scoring` of the
        component detail.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateNatoScoringRequest" }
      responses:
        "201":
          description: Active scoring bundle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NatoScoringResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"

  /api/v1/suppliers:
    get:
      tags: [suppliers]
      summary: List all suppliers (for selects + chart legends)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of suppliers, alphabetical
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Supplier" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ----- Modules -----
  /api/v1/modules:
    get:
      tags: [modules]
      summary: List modules (catalogue), aggregates hydrated server-side
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: ILIKE match against lower(sku), lower(name), lower(description)
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: Paginated list with each item carrying its aggregated_* fields
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [modules]
      summary: Create a new module
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Module + aggregates + children + parents
        "409":
          description: MODULE_SKU_ALREADY_REGISTERED

  /api/v1/modules/{module_id}:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [modules]
      summary: Module detail with hydrated aggregates, children, and parents
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ModuleResponse — extends Module with children + parents arrays
        "404":
          description: MODULE_NOT_FOUND
    patch:
      tags: [modules]
      summary: Partial update; id/created_at/updated_at ignored if sent
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Module re-hydrated with aggregates
        "404":
          description: MODULE_NOT_FOUND
        "409":
          description: MODULE_SKU_ALREADY_REGISTERED
    delete:
      tags: [modules]
      summary: Delete a module (CASCADE removes its edges but not its children)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted
        "404":
          description: MODULE_NOT_FOUND

  /api/v1/modules/{module_id}/children:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [modules]
      summary: Add a child (component XOR module) with quantity
      description: |
        Validates XOR + existence + cycle detection (WITH RECURSIVE) +
        duplicate pair. Returns the hydrated edge with `child_module` or
        `child_component` summary populated.
      security:
        - bearerAuth: []
      responses:
        "201":
          description: ModuleChildResponse with hydrated summary
        "404":
          description: MODULE_NOT_FOUND (parent missing)
        "422":
          description: |
            One of: INVALID_CHILD_REFERENCE (XOR violation OR missing referenced row),
            MODULE_CYCLE_DETECTED, CHILD_ALREADY_PRESENT.

  /api/v1/modules/{module_id}/children/{child_id}:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: child_id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [modules]
      summary: Update quantity / notes / sort_order of an existing edge
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated ModuleChildResponse
        "404":
          description: MODULE_NOT_FOUND (parent or edge missing)
        "422":
          description: quantity < 1
    delete:
      tags: [modules]
      summary: Remove an edge — idempotent on missing
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Edge removed (or never existed)

  /api/v1/modules/{module_id}/price-history:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: period
        schema: { type: string, enum: [week, month, year], default: year }
    get:
      tags: [modules]
      summary: Aggregated price time-series (server-computed from descendant components)
      description: |
        For each `valid_from` date in the period, sums
        `quantity_propagated × precio_vigente(componente, fecha)` over every
        descendant component using its preferred supplier at qty_tier=100.
        Empty `series` when no descendants have supplier_prices.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "ModulePriceHistoryResponse with series of {date, price} points"
        "404":
          description: MODULE_NOT_FOUND

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, version, timestamp]
      properties:
        status: { type: string, enum: [ok] }
        version: { type: string, example: "0.1.0" }
        timestamp: { type: string, format: date-time }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [bearer] }
        expires_in: { type: integer, description: Seconds until access_token expires }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    PasswordRecoveryRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    PasswordRecoveryResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [accepted] }
    PasswordResetRequest:
      type: object
      required: [token, new_password]
      properties:
        token: { type: string }
        new_password: { type: string }
    MeResponse:
      type: object
      required: [id, email, full_name, global_role, is_active, created_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        full_name: { type: string }
        global_role: { type: string, enum: [admin, user] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    Problem:
      type: object
      description: RFC 7807 Problem Details with a stable `code` discriminator.
      required: [title, status, code]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code: { type: string }

    Component:
      type: object
      required: [id, mpn, name, family, stock, tier, nato_score, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        mpn: { type: string, maxLength: 100 }
        sku: { type: string, nullable: true, maxLength: 100 }
        name: { type: string, maxLength: 200 }
        family: { type: string, maxLength: 100 }
        description: { type: string, nullable: true }
        datasheet_url: { type: string, nullable: true }
        location: { type: string, nullable: true, maxLength: 100 }
        fabricante: { type: string, nullable: true, maxLength: 120 }
        tipo_almacenamiento:
          type: string
          nullable: true
          maxLength: 80
          description: FE-enforced enum `Gaveta` | `Almacén` (BE column is free-text).
        holded_id: { type: string, nullable: true, maxLength: 80 }
        fecha_creacion: { type: string, format: date, nullable: true }
        notas: { type: string, nullable: true }
        stock: { type: integer, minimum: 0 }
        stock_min:
          type: integer
          nullable: true
          minimum: 0
          description: Explicit floor; when null the effective minimum is `tier * 5`.
        tier:
          type: integer
          enum: [1, 2, 3, 4]
          description: Criticality, 1 = most critical. Cached from active scoring.
        nato_score:
          type: string
          enum: ["A+", A, B, C, D, F]
          description: Cached from active scoring.
        country_of_origin:
          type: string
          nullable: true
          pattern: "^[A-Z]{2}$"
          description: ISO 3166-1 alpha-2.
        proveedor_preferente_id: { type: string, format: uuid, nullable: true }
        current_price_per_100_eur:
          type: string
          nullable: true
          description: Server-computed (latest 100u price from preferred supplier).
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ComponentDetail:
      allOf:
        - $ref: "#/components/schemas/Component"
        - type: object
          properties:
            current_nato_scoring:
              allOf:
                - $ref: "#/components/schemas/NatoScoringResponse"
              nullable: true

    ComponentCreate:
      type: object
      required: [mpn, name, family, tier, nato_score]
      properties:
        mpn: { type: string, minLength: 1, maxLength: 100 }
        name: { type: string, minLength: 1, maxLength: 200 }
        family: { type: string, minLength: 1, maxLength: 100 }
        sku: { type: string, nullable: true, maxLength: 100 }
        description: { type: string, nullable: true }
        datasheet_url: { type: string, nullable: true }
        location: { type: string, nullable: true, maxLength: 100 }
        fabricante: { type: string, nullable: true, maxLength: 120 }
        tipo_almacenamiento: { type: string, nullable: true, maxLength: 80 }
        holded_id: { type: string, nullable: true, maxLength: 80 }
        fecha_creacion: { type: string, format: date, nullable: true }
        notas: { type: string, nullable: true }
        stock: { type: integer, minimum: 0, default: 0 }
        stock_min: { type: integer, minimum: 0, nullable: true }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        nato_score: { type: string, enum: ["A+", A, B, C, D, F] }
        country_of_origin: { type: string, nullable: true, pattern: "^[A-Z]{2}$" }
        proveedor_preferente_id: { type: string, format: uuid, nullable: true }

    ComponentUpdate:
      type: object
      description: |
        All fields optional. `mpn`, `id`, `created_at`, `updated_at` are
        immutable and silently ignored if provided. `tier` and `nato_score`
        are also ignored on this endpoint — they are managed exclusively
        through the NATO scoring sub-resource.
      properties:
        sku: { type: string, nullable: true, maxLength: 100 }
        name: { type: string, minLength: 1, maxLength: 200 }
        family: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, nullable: true }
        datasheet_url: { type: string, nullable: true }
        location: { type: string, nullable: true, maxLength: 100 }
        fabricante: { type: string, nullable: true, maxLength: 120 }
        tipo_almacenamiento: { type: string, nullable: true, maxLength: 80 }
        holded_id: { type: string, nullable: true, maxLength: 80 }
        fecha_creacion: { type: string, format: date, nullable: true }
        notas: { type: string, nullable: true }
        stock: { type: integer, minimum: 0 }
        stock_min: { type: integer, minimum: 0, nullable: true }
        country_of_origin: { type: string, nullable: true, pattern: "^[A-Z]{2}$" }
        proveedor_preferente_id: { type: string, format: uuid, nullable: true }

    ComponentPurchase:
      type: object
      required:
        [id, component_id, purchased_at, quantity, supplier, unit_cost, total_cost, currency, created_at]
      properties:
        id: { type: string, format: uuid }
        component_id: { type: string, format: uuid }
        purchased_at: { type: string, format: date }
        quantity: { type: integer, minimum: 1 }
        supplier: { type: string }
        unit_cost: { type: string, description: Decimal-as-string. }
        total_cost: { type: string, description: Decimal-as-string. }
        currency: { type: string, example: EUR }
        created_at: { type: string, format: date-time }

    PaginatedComponents:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Component" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    PaginatedComponentPurchases:
      type: object
      deprecated: true
      description: Superseded by PaginatedStockEvents — kept here only as a legacy reference.
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ComponentPurchase" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    Supplier:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }

    StockEvent:
      type: object
      description: |
        Append-only ledger row. Some fields are kind-specific (see `kind`).
        Purchase rows fill supplier_*/unit_cost/total_cost/currency; consumption
        rows fill project_id + project_name_snapshot.
      required:
        [id, component_id, kind, quantity, occurred_at, currency, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        component_id: { type: string, format: uuid }
        kind: { type: string, enum: [purchase, consumption] }
        quantity: { type: integer, minimum: 1 }
        occurred_at: { type: string, format: date }
        notes: { type: string, nullable: true }
        supplier_id: { type: string, format: uuid, nullable: true }
        supplier_name: { type: string, nullable: true, description: "JOIN with suppliers.name (server-set)" }
        unit_cost: { type: string, nullable: true, description: Decimal as string }
        total_cost: { type: string, nullable: true, description: Decimal as string }
        currency: { type: string, minLength: 3, maxLength: 3 }
        project_id: { type: string, format: uuid, nullable: true }
        project_name_snapshot: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PaginatedStockEvents:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/StockEvent" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    SupplierPrice:
      type: object
      required: [id, component_id, supplier_id, qty_tier, price, valid_from]
      properties:
        id: { type: string, format: uuid }
        component_id: { type: string, format: uuid }
        supplier_id: { type: string, format: uuid }
        qty_tier: { type: integer, enum: [1, 10, 100, 1000] }
        price: { type: string, description: "Decimal as string, EUR" }
        valid_from: { type: string, format: date }

    SupplierStockSnapshot:
      type: object
      required: [id, component_id, supplier_id, quantity, snapshot_at]
      properties:
        id: { type: string, format: uuid }
        component_id: { type: string, format: uuid }
        supplier_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 0 }
        snapshot_at: { type: string, format: date }

    ComponentSummary:
      type: object
      description: Lightweight subset of Component embedded in cross-references (e.g. scoring alternatives).
      required: [id, mpn, name, family, nato_score, tier, stock]
      properties:
        id: { type: string, format: uuid }
        mpn: { type: string }
        sku: { type: string, nullable: true }
        name: { type: string }
        family: { type: string }
        fabricante: { type: string, nullable: true }
        country_of_origin: { type: string, nullable: true, minLength: 2, maxLength: 2 }
        nato_score: { type: string, enum: ["A+", A, B, C, D, F] }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        stock: { type: integer, minimum: 0 }
        current_price_per_100_eur: { type: string, nullable: true }

    ScoringClassification:
      type: object
      required: [id, nato_scoring_id, part_label, verificado, sort_order]
      properties:
        id: { type: string, format: uuid }
        nato_scoring_id: { type: string, format: uuid }
        part_label: { type: string }
        fabricante: { type: string, nullable: true }
        country_of_origin: { type: string, nullable: true, minLength: 2, maxLength: 2 }
        nato_score: { type: string, enum: ["A+", A, B, C, D, F], nullable: true }
        verificado: { type: boolean }
        notas: { type: string, nullable: true }
        reference_component_id: { type: string, format: uuid, nullable: true }
        reference_url: { type: string, nullable: true }
        sort_order: { type: integer, minimum: 0 }

    ScoringAlternative:
      type: object
      required: [id, nato_scoring_id, alternative_component_id, sort_order]
      properties:
        id: { type: string, format: uuid }
        nato_scoring_id: { type: string, format: uuid }
        alternative_component_id: { type: string, format: uuid }
        notes: { type: string, nullable: true }
        sort_order: { type: integer, minimum: 0 }
        alternative_component:
          allOf:
            - $ref: "#/components/schemas/ComponentSummary"
          nullable: true
          description: Hydrated server-side; null if the referenced component was deleted.

    NatoScoringSummary:
      type: object
      description: Scoring envelope without classifications/alternatives.
      required:
        [id, component_id, nato_score, tier, classified_at, expires_at, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        component_id: { type: string, format: uuid }
        nato_score: { type: string, enum: ["A+", A, B, C, D, F] }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        classified_at: { type: string, format: date }
        expires_at: { type: string, format: date }
        classified_by_user_id: { type: string, format: uuid, nullable: true }
        classified_by_full_name: { type: string, nullable: true }
        status: { type: string, enum: [active, archived] }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    NatoScoringResponse:
      allOf:
        - $ref: "#/components/schemas/NatoScoringSummary"
        - type: object
          properties:
            classifications:
              type: array
              items: { $ref: "#/components/schemas/ScoringClassification" }
            alternatives:
              type: array
              items: { $ref: "#/components/schemas/ScoringAlternative" }

    ClassificationInput:
      type: object
      required: [part_label]
      properties:
        part_label: { type: string, minLength: 1, maxLength: 200 }
        fabricante: { type: string, nullable: true }
        country_of_origin: { type: string, nullable: true, minLength: 2, maxLength: 2 }
        nato_score: { type: string, enum: ["A+", A, B, C, D, F], nullable: true }
        verificado: { type: boolean, default: false }
        notas: { type: string, nullable: true }
        reference_component_id: { type: string, format: uuid, nullable: true }
        reference_url: { type: string, nullable: true }

    AlternativeInput:
      type: object
      required: [alternative_component_id]
      properties:
        alternative_component_id: { type: string, format: uuid }
        notes: { type: string, nullable: true }

    CreateNatoScoringRequest:
      type: object
      required: [nato_score, tier]
      properties:
        nato_score: { type: string, enum: ["A+", A, B, C, D, F] }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        classified_at: { type: string, format: date, description: defaults to today }
        expires_at: { type: string, format: date, description: defaults to classified_at + 6 months }
        notes: { type: string, nullable: true }
        classifications:
          type: array
          items: { $ref: "#/components/schemas/ClassificationInput" }
        alternatives:
          type: array
          items: { $ref: "#/components/schemas/AlternativeInput" }

    ComponentSyncResponse:
      type: object
      deprecated: true
      description: Superseded — KiCAT/Holded sync ships in its own USs.
      required: [status]
      properties:
        status: { type: string, enum: [queued] }

  responses:
    Unauthorized:
      description: |
        Authentication failed. `code` is one of:
        `INVALID_CREDENTIALS`, `UNAUTHENTICATED`, `ACCESS_TOKEN_EXPIRED`,
        `ACCESS_TOKEN_WRONG_TYPE`, `ACCESS_TOKEN_MALFORMED`,
        `REFRESH_TOKEN_EXPIRED`, `REFRESH_TOKEN_REVOKED`,
        `REFRESH_TOKEN_MALFORMED`.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Validation:
      description: Pydantic validation error.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    RateLimited:
      description: Per-IP rate limit exceeded.
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ResetTokenInvalid:
      description: |
        Reset failed. `code` is one of `RESET_TOKEN_EXPIRED`,
        `RESET_TOKEN_ALREADY_USED`, `RESET_TOKEN_INVALID`.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ComponentNotFound:
      description: "Component not found (code: COMPONENT_NOT_FOUND)."
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
