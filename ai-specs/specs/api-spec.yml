openapi: 3.1.0
info:
  title: ADA ASM API
  version: 0.1.0
  description: |
    REST API for ADA ASM. This file is the source of truth for the API
    contract and is regenerated from the FastAPI app's `/openapi.json`
    on every PR that changes `backend/app/api/**`.

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: health
    description: Liveness / readiness probes
  - name: auth
    description: Authentication, refresh, password reset, current user
  - name: components
    description: Component catalogue — CRUD, search, purchases, sync placeholder

paths:
  /api/v1/health:
    get:
      tags: [health]
      summary: Service health check
      description: Unauthenticated probe. Always 200 when reachable.
      operationId: health_health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Issue access + refresh tokens for valid credentials
      description: |
        Returns a uniform 401 (`code: INVALID_CREDENTIALS`) for unknown email,
        wrong password, or inactive user — body is byte-identical across the
        three cases.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/Validation"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate refresh + access tokens
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Revoke the supplied refresh token (idempotent)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogoutRequest" }
      responses:
        "204":
          description: Logged out (or no-op for unknown tokens)

  /api/v1/auth/password-recovery:
    post:
      tags: [auth]
      summary: Send a password-reset link (anti-enumeration)
      description: |
        Always returns 202. Sends an email only if the address matches an
        active user; the response body is identical either way.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordRecoveryRequest" }
      responses:
        "202":
          description: Request accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordRecoveryResponse" }
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/password-reset:
    post:
      tags: [auth]
      summary: Redeem a password-reset token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetRequest" }
      responses:
        "204":
          description: Password updated; all active refresh tokens for the user are revoked.
        "400":
          $ref: "#/components/responses/ResetTokenInvalid"
        "422":
          $ref: "#/components/responses/Validation"

  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Return the currently authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/components:
    get:
      tags: [components]
      summary: List components (paginated, searchable)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: Case-insensitive search over mpn / sku / name / family.
        - in: query
          name: family
          schema: { type: string }
        - in: query
          name: supplier
          schema: { type: string }
        - in: query
          name: tier
          schema: { type: string, enum: ["A+", A, B, C, D] }
        - in: query
          name: nato_score
          schema:
            type: string
            enum: [100_otan, otan, allied_otan, neutral, high_risk, no_otan]
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: Paginated catalogue
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedComponents" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/Validation"
    post:
      tags: [components]
      summary: Create a component
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComponentCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Component" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: "MPN already registered (code: MPN_ALREADY_REGISTERED)"
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          $ref: "#/components/responses/Validation"

  /api/v1/components/{component_id}:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [components]
      summary: Get one component (with active NATO scoring bundle)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ComponentDetail — Component extended with `current_nato_scoring`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComponentDetail" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"
    patch:
      tags: [components]
      summary: Partially update a component (mpn is immutable)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComponentUpdate" }
      responses:
        "200":
          description: Updated component
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Component" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"
        "422":
          $ref: "#/components/responses/Validation"
    delete:
      tags: [components]
      summary: Delete a component (idempotent on missing)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted (or already absent)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/components/{component_id}/stock-events:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: page
        schema: { type: integer, minimum: 1, default: 1 }
      - in: query
        name: page_size
        schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
    get:
      tags: [components]
      summary: Paginated stock event ledger (purchase + consumption, newest first)
      description: |
        Append-only ledger that drives the "Historial de compras" modal. Each row carries
        the full event payload (kind, quantity, occurred_at, notes, plus purchase-only
        fields supplier_id/supplier_name/unit_cost/total_cost/currency and
        consumption-only fields project_id/project_name_snapshot). Supersedes the
        previous `/purchases` endpoint.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated stock events ordered by `occurred_at DESC`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedStockEvents" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"

  /api/v1/components/{component_id}/supplier-prices:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [components]
      summary: Time-series of catalogue prices per (supplier, qty_tier, valid_from)
      description: |
        Drives the "Precios de hoy" table (latest per supplier × tier) and the
        "Histórico de precios" chart (filtered by tier + period on the FE).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of SupplierPrice rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SupplierPrice" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"

  /api/v1/components/{component_id}/supplier-stocks:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [components]
      summary: Time-series of supplier-side stock snapshots per (supplier, snapshot_at)
      description: Drives the "Stock disponible en proveedores" chart.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of SupplierStockSnapshot rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SupplierStockSnapshot" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"

  /api/v1/components/{component_id}/parents:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [components]
      summary: Modules that hold this component as a direct child
      description: |
        Drives the "Pertenece a" section on the component detail page. Returns
        hydrated module summaries (with `precio_total`, `aggregated_nato_score`,
        `aggregated_tier`, `aggregated_expires_at`, `buildable_stock`) so the
        FE renders them with the same canonical modules hierarchy table used
        in the modules list and "Contiene" sections.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of `ModuleSummary` — one entry per direct parent module.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ModuleSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"

  /api/v1/components/{component_id}/nato-scorings:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [components]
      summary: Full audit trail of NATO scorings for the component (active + archived)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of NatoScoringSummary rows, newest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NatoScoringSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"
    post:
      tags: [components]
      summary: Create a new active scoring (atomically archives the previous active one)
      description: |
        Inserts a new `component_nato_scorings` row with `status='active'`,
        archives the previous active row, replaces classifications/alternatives,
        and updates the component's cached `(nato_score, tier)`. The active
        scoring's full bundle is returned in `current_nato_scoring` of the
        component detail.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateNatoScoringRequest" }
      responses:
        "201":
          description: Active scoring bundle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NatoScoringResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"

  /api/v1/suppliers:
    get:
      tags: [suppliers]
      summary: List all suppliers (for selects + chart legends)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of suppliers, alphabetical
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Supplier" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ----- Modules -----
  /api/v1/modules:
    get:
      tags: [modules]
      summary: List modules (catalogue), aggregates hydrated server-side
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: ILIKE match against lower(sku), lower(name), lower(description)
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: Paginated list with each item carrying its aggregated_* fields
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [modules]
      summary: Create a new module
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Module + aggregates + children + parents
        "409":
          description: MODULE_SKU_ALREADY_REGISTERED

  /api/v1/modules/{module_id}:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [modules]
      summary: Module detail with hydrated aggregates, children, and parents
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ModuleResponse — extends Module with children + parents arrays
        "404":
          description: MODULE_NOT_FOUND
    patch:
      tags: [modules]
      summary: Partial update; id/created_at/updated_at ignored if sent
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Module re-hydrated with aggregates
        "404":
          description: MODULE_NOT_FOUND
        "409":
          description: MODULE_SKU_ALREADY_REGISTERED
    delete:
      tags: [modules]
      summary: Delete a module (CASCADE removes its edges but not its children)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted
        "404":
          description: MODULE_NOT_FOUND

  /api/v1/modules/{module_id}/children:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [modules]
      summary: Add a child (component XOR module) with quantity
      description: |
        Validates XOR + existence + cycle detection (WITH RECURSIVE) +
        duplicate pair. Returns the hydrated edge with `child_module` or
        `child_component` summary populated.
      security:
        - bearerAuth: []
      responses:
        "201":
          description: ModuleChildResponse with hydrated summary
        "404":
          description: MODULE_NOT_FOUND (parent missing)
        "422":
          description: |
            One of: INVALID_CHILD_REFERENCE (XOR violation OR missing referenced row),
            MODULE_CYCLE_DETECTED, CHILD_ALREADY_PRESENT.

  /api/v1/modules/{module_id}/children/{child_id}:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: child_id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [modules]
      summary: Update quantity / notes / sort_order of an existing edge
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated ModuleChildResponse
        "404":
          description: MODULE_NOT_FOUND (parent or edge missing)
        "422":
          description: quantity < 1
    delete:
      tags: [modules]
      summary: Remove an edge — idempotent on missing
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Edge removed (or never existed)

  /api/v1/modules/{module_id}/price-history:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: period
        schema: { type: string, enum: [week, month, year], default: year }
    get:
      tags: [modules]
      summary: Aggregated price time-series (server-computed from descendant components)
      description: |
        For each `valid_from` date in the period, sums
        `quantity_propagated × precio_vigente(componente, fecha)` over every
        descendant component using its preferred supplier at qty_tier=100.
        Empty `series` when no descendants have supplier_prices.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "ModulePriceHistoryResponse with series of {date, price} points"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModulePriceHistoryResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: MODULE_NOT_FOUND

  /api/v1/modules/{module_id}/stock-events:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [modules]
      summary: Module-level stock events (fabricated / delivered) ordered by `occurred_at DESC`
      description: |
        Drives the "Histórico de fabricación" modal. Returns events with
        `module_id` set and `kind in ('fabricated', 'delivered')`. Supports
        pagination.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Paginated `StockEvent` rows for this module.
          content:
            application/json:
              schema:
                type: object
                required: [items, total, page, page_size]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/StockEvent" }
                  total: { type: integer, minimum: 0 }
                  page: { type: integer, minimum: 1 }
                  page_size: { type: integer, minimum: 1 }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: MODULE_NOT_FOUND

  /api/v1/modules/{module_id}/component-purchases-summary:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [modules]
      summary: Aggregated supplier spend across descendant components
      description: |
        For each supplier that has been purchased from for any descendant
        component of this module, returns total qty + total cost (EUR).
        Drives the "Proveedor más comprado" pane on the module detail and
        the "Historial de fabricación" modal.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of `SupplierPurchaseSummary` rows.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SupplierPurchaseSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: MODULE_NOT_FOUND

  /api/v1/modules/{module_id}/projects-using:
    parameters:
      - in: path
        name: module_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [modules]
      summary: Projects that hold this module as a direct child
      description: |
        Drives the "Usado en proyectos" section on the module detail. Returns
        hydrated ProjectSummary rows.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of `ProjectSummary` rows.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProjectSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: MODULE_NOT_FOUND

  /api/v1/components/{component_id}/projects-using:
    parameters:
      - in: path
        name: component_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [components]
      summary: Projects that hold this component as a direct child
      description: |
        Drives the "Usado en proyectos" section on the component detail.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of `ProjectSummary` rows.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProjectSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/ComponentNotFound"

  /api/v1/projects:
    get:
      tags: [projects]
      summary: List projects (catalogue), aggregates hydrated server-side
      description: |
        Default behaviour excludes `Archived` rows. Pass `include_archived=true`
        to lift the exclusion. `status[]` is repeatable and, when provided,
        replaces the default filter entirely.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: Case-insensitive over `code`, `name`, `customer.name`.
        - in: query
          name: status
          schema:
            type: array
            items: { $ref: "#/components/schemas/ProjectStatus" }
          style: form
          explode: true
        - in: query
          name: include_archived
          schema: { type: boolean, default: false }
        - in: query
          name: customer_id
          schema: { type: array, items: { type: string, format: uuid } }
          style: form
          explode: true
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: PaginatedProjects — each item carries aggregates + customer hydrated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedProjects" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [projects]
      summary: Create a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectCreate" }
      responses:
        "201":
          description: ProjectResponse (hydrated)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectResponse" }
        "409":
          description: PROJECT_CODE_ALREADY_REGISTERED
        "422":
          description: Validation errors.

  /api/v1/projects/{project_id}:
    parameters:
      - in: path
        name: project_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [projects]
      summary: Project detail (aggregates + children + customer hydrated)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ProjectResponse
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectResponse" }
        "404":
          description: PROJECT_NOT_FOUND
    patch:
      tags: [projects]
      summary: Partial update — code is mutable; transition to Delivered auto-fills fecha_entrega_real
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectUpdate" }
      responses:
        "200":
          description: ProjectResponse
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectResponse" }
        "404":
          description: PROJECT_NOT_FOUND
        "409":
          description: PROJECT_CODE_ALREADY_REGISTERED
    delete:
      tags: [projects]
      summary: Soft-delete — sets status='Archived'
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Archived (idempotent)
        "404":
          description: PROJECT_NOT_FOUND

  /api/v1/projects/{project_id}/children:
    parameters:
      - in: path
        name: project_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [projects]
      summary: Add a project→(module|component) edge
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddProjectChildRequest" }
      responses:
        "201":
          description: ProjectChildResponse (hydrated)
        "404":
          description: PROJECT_NOT_FOUND or INVALID_CHILD_REFERENCE
        "409":
          description: CHILD_ALREADY_PRESENT
        "422":
          description: XOR violation or validation errors.

  /api/v1/projects/{project_id}/children/{child_id}:
    parameters:
      - in: path
        name: project_id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: child_id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [projects]
      summary: Patch quantity / notes / sort_order on an existing edge
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProjectChildRequest" }
      responses:
        "200":
          description: ProjectChildResponse (re-hydrated)
        "404":
          description: PROJECT_NOT_FOUND or child missing
    delete:
      tags: [projects]
      summary: Remove an edge (referenced entity is NOT touched)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Removed (idempotent)

  /api/v1/projects/{project_id}/price-history:
    parameters:
      - in: path
        name: project_id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: period
        schema: { type: string, enum: [week, month, year], default: year }
    get:
      tags: [projects]
      summary: Aggregated price time-series (server-computed)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ProjectPriceHistoryResponse
        "404":
          description: PROJECT_NOT_FOUND

  /api/v1/projects/{project_id}/stock-events:
    parameters:
      - in: path
        name: project_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [projects]
      summary: Stock events tied to this project (consumption + delivered)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Paginated StockEvent rows ordered by `occurred_at DESC`.
        "404":
          description: PROJECT_NOT_FOUND

  /api/v1/projects/{project_id}/interest-links:
    parameters:
      - in: path
        name: project_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [projects]
      summary: Create an interest link for a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectInterestLinkCreate" }
      responses:
        "201":
          description: ProjectInterestLink
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectInterestLink" }
        "404":
          description: PROJECT_NOT_FOUND
        "422":
          description: Validation errors.

  /api/v1/projects/{project_id}/interest-links/{link_id}:
    parameters:
      - in: path
        name: project_id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: link_id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [projects]
      summary: Patch an interest link (name / url / sort_order)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectInterestLinkUpdate" }
      responses:
        "200":
          description: ProjectInterestLink
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectInterestLink" }
        "404":
          description: PROJECT_NOT_FOUND or link missing
    delete:
      tags: [projects]
      summary: Remove an interest link
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Removed (idempotent on missing)

  /api/v1/customers:
    get:
      tags: [customers]
      summary: List all customers (no pagination yet)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of Customer rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Customer" }
    post:
      tags: [customers]
      summary: Create a customer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomerCreate" }
      responses:
        "201":
          description: Customer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
        "409":
          description: CUSTOMER_HOLDED_ID_ALREADY_REGISTERED

  /api/v1/customers/{customer_id}:
    parameters:
      - in: path
        name: customer_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [customers]
      summary: Single customer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Customer
        "404":
          description: CUSTOMER_NOT_FOUND
    patch:
      tags: [customers]
      summary: Partial update
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomerUpdate" }
      responses:
        "200":
          description: Customer
        "404":
          description: CUSTOMER_NOT_FOUND
        "409":
          description: CUSTOMER_HOLDED_ID_ALREADY_REGISTERED
    delete:
      tags: [customers]
      summary: Delete a customer (projects.customer_id becomes NULL)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /api/v1/config:
    get:
      tags: [config]
      summary: Runtime config exposed to the FE (Holded base URL)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ConfigResponse
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigResponse" }

  /api/v1/components/lookup:
    get:
      tags: [components]
      summary: Look up a component by MPN across all enabled suppliers
      description: >
        Walks `SUPPLIER_LOOKUP_PRIORITY` and merges quotes progressively
        (first non-null wins per scalar field). Empty strings from a
        higher-priority supplier are treated as missing so a later
        supplier with a real value can fill the gap. Result is cached in
        Redis under `supplier_lookup:{lower(mpn)}` for
        `SUPPLIER_LOOKUP_CACHE_TTL_SECONDS` (default 900). Use this to
        pre-fill the "Nuevo componente" form by MPN. Introduced by the
        `supplier-sync` change.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: mpn
          required: true
          schema: { type: string, minLength: 3, maxLength: 60 }
          description: Manufacturer part number (case-insensitive, trimmed).
        - in: query
          name: force_refresh
          required: false
          schema: { type: boolean, default: false }
          description: Bypass the Redis cache and re-query every enabled supplier.
      responses:
        "200":
          description: Lookup succeeded — at least one supplier returned data.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LookupResponse" }
        "401": { description: Unauthenticated. }
        "404":
          description: At least one supplier responded but none had a match.
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  code: { type: string, enum: [COMPONENT_MPN_NOT_FOUND] }
        "422":
          description: MPN failed validation (too short, too long, etc.).
        "502":
          description: Every consulted supplier raised a transport error.
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  code: { type: string, enum: [SUPPLIER_LOOKUP_UNAVAILABLE] }

  /api/v1/supplier-sync/runs:
    get:
      tags: [supplier-sync]
      summary: List recent supplier sync runs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: supplier
          schema:
            type: string
            enum: [mouser, digikey, tme, farnell, rs]
      responses:
        "200":
          description: Paginated list of runs, ordered by `started_at DESC`.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SupplierSyncRunResponse" }
        "401": { description: Unauthenticated. }
    post:
      tags: [supplier-sync]
      summary: Enqueue an ad-hoc supplier sync (no waiting for the daily Beat)
      description: >
        Pre-creates the `supplier_sync_runs` row HTTP-side so the
        operator gets the real `run_id` back synchronously, then
        enqueues `sync_one_supplier.delay(code, run_id)` on Celery. Poll
        `GET /api/v1/supplier-sync/runs/{run_id}` for completion. Fails
        with 422 `SUPPLIER_NOT_ENABLED` when the supplier is not listed
        in `SUPPLIER_SYNC_ENABLED_SUPPLIERS` or has no credentials.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: supplier
          required: true
          schema:
            type: string
            enum: [mouser, digikey, tme, farnell, rs]
      responses:
        "202":
          description: Sync task enqueued.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TriggerSyncResponse" }
        "401": { description: Unauthenticated. }
        "422":
          description: Supplier not enabled or has no credentials.
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  code: { type: string, enum: [SUPPLIER_NOT_ENABLED] }

  /api/v1/supplier-sync/runs/{run_id}/errors:
    get:
      tags: [supplier-sync]
      summary: Per-component errors captured during one sync run
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 200 }
      responses:
        "200":
          description: Errors for the run, ordered by `occurred_at DESC`.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SupplierSyncErrorResponse" }
        "404":
          description: Unknown run id.
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  code: { type: string, enum: [SUPPLIER_SYNC_RUN_NOT_FOUND] }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, version, timestamp]
      properties:
        status: { type: string, enum: [ok] }
        version: { type: string, example: "0.1.0" }
        timestamp: { type: string, format: date-time }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [bearer] }
        expires_in: { type: integer, description: Seconds until access_token expires }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    PasswordRecoveryRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    PasswordRecoveryResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [accepted] }
    PasswordResetRequest:
      type: object
      required: [token, new_password]
      properties:
        token: { type: string }
        new_password: { type: string }
    MeResponse:
      type: object
      required: [id, email, full_name, global_role, is_active, created_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        full_name: { type: string }
        global_role: { type: string, enum: [admin, user] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    Problem:
      type: object
      description: RFC 7807 Problem Details with a stable `code` discriminator.
      required: [title, status, code]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code: { type: string }

    Component:
      type: object
      required: [id, mpn, name, family, stock, tier, nato_score, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        mpn: { type: string, maxLength: 100 }
        sku: { type: string, nullable: true, maxLength: 100 }
        name: { type: string, maxLength: 200 }
        family: { type: string, maxLength: 100 }
        description: { type: string, nullable: true }
        datasheet_url: { type: string, nullable: true }
        location: { type: string, nullable: true, maxLength: 100 }
        fabricante: { type: string, nullable: true, maxLength: 120 }
        tipo_almacenamiento:
          type: string
          nullable: true
          maxLength: 80
          description: FE-enforced enum `Gaveta` | `Almacén` (BE column is free-text).
        holded_id: { type: string, nullable: true, maxLength: 80 }
        fecha_creacion: { type: string, format: date, nullable: true }
        notas: { type: string, nullable: true }
        stock: { type: integer, minimum: 0 }
        stock_min:
          type: integer
          nullable: true
          minimum: 0
          description: Explicit floor; when null the effective minimum is `tier * 5`.
        tier:
          type: integer
          enum: [1, 2, 3, 4]
          description: Criticality, 1 = most critical. Cached from active scoring.
        nato_score:
          type: string
          enum: ["A+", A, B, C, D, F]
          description: Cached from active scoring.
        country_of_origin:
          type: string
          nullable: true
          pattern: "^[A-Z]{2}$"
          description: ISO 3166-1 alpha-2.
        proveedor_preferente_id: { type: string, format: uuid, nullable: true }
        current_price_per_100_eur:
          type: string
          nullable: true
          description: Server-computed (latest 100u price from preferred supplier).
        supplier_stock_summary:
          type: array
          description: |
            Latest snapshot per supplier — server-hydrated in a single batched query.
            Drives the `<StockStatusBadge>` colour and tooltip on list/hierarchy tables
            without an N+1 round trip. Empty array means no supplier inventory has ever
            been recorded (not "unknown").
          items:
            $ref: "#/components/schemas/SupplierStockSummaryEntry"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SupplierStockSummaryEntry:
      type: object
      required: [supplier_id, supplier_name, quantity]
      properties:
        supplier_id: { type: string, format: uuid }
        supplier_name: { type: string }
        quantity: { type: integer, minimum: 0 }

    ComponentDetail:
      allOf:
        - $ref: "#/components/schemas/Component"
        - type: object
          properties:
            current_nato_scoring:
              allOf:
                - $ref: "#/components/schemas/NatoScoringResponse"
              nullable: true

    ComponentCreate:
      type: object
      required: [mpn, name, family, tier, nato_score]
      properties:
        mpn: { type: string, minLength: 1, maxLength: 100 }
        name: { type: string, minLength: 1, maxLength: 200 }
        family: { type: string, minLength: 1, maxLength: 100 }
        sku: { type: string, nullable: true, maxLength: 100 }
        description: { type: string, nullable: true }
        datasheet_url: { type: string, nullable: true }
        location: { type: string, nullable: true, maxLength: 100 }
        fabricante: { type: string, nullable: true, maxLength: 120 }
        tipo_almacenamiento: { type: string, nullable: true, maxLength: 80 }
        holded_id: { type: string, nullable: true, maxLength: 80 }
        fecha_creacion: { type: string, format: date, nullable: true }
        notas: { type: string, nullable: true }
        stock: { type: integer, minimum: 0, default: 0 }
        stock_min: { type: integer, minimum: 0, nullable: true }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        nato_score: { type: string, enum: ["A+", A, B, C, D, F] }
        country_of_origin: { type: string, nullable: true, pattern: "^[A-Z]{2}$" }
        proveedor_preferente_id: { type: string, format: uuid, nullable: true }

    ComponentUpdate:
      type: object
      description: |
        All fields optional. `mpn`, `id`, `created_at`, `updated_at` are
        immutable and silently ignored if provided. `tier` and `nato_score`
        are also ignored on this endpoint — they are managed exclusively
        through the NATO scoring sub-resource.
      properties:
        sku: { type: string, nullable: true, maxLength: 100 }
        name: { type: string, minLength: 1, maxLength: 200 }
        family: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, nullable: true }
        datasheet_url: { type: string, nullable: true }
        location: { type: string, nullable: true, maxLength: 100 }
        fabricante: { type: string, nullable: true, maxLength: 120 }
        tipo_almacenamiento: { type: string, nullable: true, maxLength: 80 }
        holded_id: { type: string, nullable: true, maxLength: 80 }
        fecha_creacion: { type: string, format: date, nullable: true }
        notas: { type: string, nullable: true }
        stock: { type: integer, minimum: 0 }
        stock_min: { type: integer, minimum: 0, nullable: true }
        country_of_origin: { type: string, nullable: true, pattern: "^[A-Z]{2}$" }
        proveedor_preferente_id: { type: string, format: uuid, nullable: true }

    ComponentPurchase:
      type: object
      required:
        [id, component_id, purchased_at, quantity, supplier, unit_cost, total_cost, currency, created_at]
      properties:
        id: { type: string, format: uuid }
        component_id: { type: string, format: uuid }
        purchased_at: { type: string, format: date }
        quantity: { type: integer, minimum: 1 }
        supplier: { type: string }
        unit_cost: { type: string, description: Decimal-as-string. }
        total_cost: { type: string, description: Decimal-as-string. }
        currency: { type: string, example: EUR }
        created_at: { type: string, format: date-time }

    PaginatedComponents:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Component" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    PaginatedComponentPurchases:
      type: object
      deprecated: true
      description: Superseded by PaginatedStockEvents — kept here only as a legacy reference.
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ComponentPurchase" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    Supplier:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }

    StockEvent:
      type: object
      description: |
        Append-only ledger row. Polymorphic owner: exactly one of `component_id` /
        `module_id` is non-null per row (DB-level XOR CHECK).

        Kind dictates which fields are populated:
          * `purchase`     — component-level restock from a supplier.
            Fills: component_id, supplier_id, unit_cost, total_cost, currency.
          * `consumption`  — component allocated to a project.
            Fills: component_id, project_id, project_name_snapshot.
          * `fabricated`   — module assembled in-house. Adds units to the module's stock.
            Fills: module_id, unit_cost, total_cost (computed cost per assembled unit).
          * `delivered`    — module shipped to a customer. Removes units from stock.
            Fills: module_id, customer_id_holded, customer_name_snapshot.
      required: [id, kind, quantity, occurred_at, currency, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        component_id:
          type: string
          format: uuid
          nullable: true
          description: Set for component-level events (`purchase`, `consumption`). Null for module events.
        module_id:
          type: string
          format: uuid
          nullable: true
          description: Set for module-level events (`fabricated`, `delivered`). Null for component events.
        kind:
          type: string
          enum: [purchase, consumption, fabricated, delivered]
        quantity: { type: integer, minimum: 1 }
        occurred_at: { type: string, format: date }
        notes: { type: string, nullable: true }
        supplier_id: { type: string, format: uuid, nullable: true }
        supplier_name: { type: string, nullable: true, description: "JOIN with suppliers.name (server-set)" }
        unit_cost: { type: string, nullable: true, description: Decimal as string }
        total_cost: { type: string, nullable: true, description: Decimal as string }
        currency: { type: string, minLength: 3, maxLength: 3 }
        project_id: { type: string, format: uuid, nullable: true }
        project_name_snapshot: { type: string, nullable: true }
        customer_id_holded:
          type: string
          nullable: true
          maxLength: 64
          description: "`delivered` only — Holded customer ID for the module shipment."
        customer_name_snapshot:
          type: string
          nullable: true
          maxLength: 200
          description: "`delivered` only — denormalised customer display name for audit."
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ----- Modules -----

    Module:
      type: object
      description: A reusable assembly catalogue entry (intermediate node of the asset tree).
      required: [id, sku, name, version, family, stock, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        sku: { type: string, maxLength: 100 }
        name: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        version: { type: string, maxLength: 40 }
        family:
          type: string
          enum: [Board, Device, Bundle, Case]
          description: DB-enforced enum.
        fabricante: { type: string, nullable: true, maxLength: 120 }
        location: { type: string, nullable: true, maxLength: 100 }
        tipo_almacenamiento: { type: string, nullable: true, maxLength: 80 }
        stock: { type: integer, minimum: 0, description: Assembled units in the warehouse. }
        notas: { type: string, nullable: true }
        fecha_creacion: { type: string, format: date, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ModuleSummary:
      type: object
      description: |
        `Module` extended with server-computed aggregates over its descendant
        components. Aggregates are hydrated on every list/detail/parents read
        and are never persisted. Empty modules return `precio_total=null`,
        `aggregated_*=null`, `buildable_stock=0`.
      allOf:
        - $ref: "#/components/schemas/Module"
        - type: object
          properties:
            precio_total:
              type: string
              nullable: true
              description: Decimal sum of `descendant.current_price_per_100_eur × quantity / 100` (EUR).
            aggregated_nato_score:
              type: string
              enum: ["A+", A, B, C, D, F]
              nullable: true
              description: Worst (lexicographic min `F < D < C < B < A < A+`) score across descendants.
            aggregated_tier:
              type: integer
              enum: [1, 2, 3, 4]
              nullable: true
              description: Worst (numeric min, Tier 1 = worst) tier across descendants.
            aggregated_expires_at:
              type: string
              format: date
              nullable: true
              description: Earliest scoring expiration across descendants.
            buildable_stock:
              type: integer
              minimum: 0
              description: |
                How many full units of this module can be built from current component
                stock. `min_over_descendants(floor(descendant.stock / quantity_required))`.

    ModuleChild:
      type: object
      description: |
        One edge in the module DAG. XOR — exactly one of `child_module_id` /
        `child_component_id` is non-null. When `child_module` / `child_component`
        is hydrated, it carries the embedded summary for that child.
      required: [id, parent_module_id, quantity, sort_order]
      properties:
        id: { type: string, format: uuid }
        parent_module_id: { type: string, format: uuid }
        child_module_id: { type: string, format: uuid, nullable: true }
        child_component_id: { type: string, format: uuid, nullable: true }
        quantity: { type: integer, minimum: 1 }
        sort_order: { type: integer }
        notes: { type: string, nullable: true }
        child_module:
          allOf:
            - $ref: "#/components/schemas/ModuleSummary"
          nullable: true
        child_component:
          allOf:
            - $ref: "#/components/schemas/ComponentSummary"
          nullable: true

    ModuleResponse:
      type: object
      description: Module detail — extends `ModuleSummary` with hydrated children + parents.
      allOf:
        - $ref: "#/components/schemas/ModuleSummary"
        - type: object
          required: [children, parents]
          properties:
            children:
              type: array
              items: { $ref: "#/components/schemas/ModuleChild" }
            parents:
              type: array
              items: { $ref: "#/components/schemas/ModuleSummary" }

    PaginatedModules:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ModuleSummary" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    ModuleCreate:
      type: object
      required: [sku, name]
      properties:
        sku: { type: string, minLength: 1, maxLength: 100 }
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, nullable: true }
        version: { type: string, maxLength: 40 }
        family: { type: string, enum: [Board, Device, Bundle, Case] }
        fabricante: { type: string, nullable: true, maxLength: 120 }
        location: { type: string, nullable: true, maxLength: 100 }
        tipo_almacenamiento: { type: string, nullable: true, maxLength: 80 }
        stock: { type: integer, minimum: 0 }
        notas: { type: string, nullable: true }
        fecha_creacion: { type: string, format: date, nullable: true }

    ModuleUpdate:
      type: object
      description: All fields optional; immutable fields (id, created_at, updated_at) ignored.
      properties:
        sku: { type: string, maxLength: 100 }
        name: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        version: { type: string, maxLength: 40 }
        family: { type: string, enum: [Board, Device, Bundle, Case] }
        fabricante: { type: string, nullable: true, maxLength: 120 }
        location: { type: string, nullable: true, maxLength: 100 }
        tipo_almacenamiento: { type: string, nullable: true, maxLength: 80 }
        stock: { type: integer, minimum: 0 }
        notas: { type: string, nullable: true }
        fecha_creacion: { type: string, format: date, nullable: true }

    AddChildRequest:
      type: object
      description: |
        Adds one edge to a module's children. Exactly one of `child_module_id` /
        `child_component_id` MUST be set (XOR enforced by the BE; 422 otherwise).
        Cycles among module nodes are rejected by `ModuleService` before insert.
      required: [quantity]
      properties:
        child_module_id: { type: string, format: uuid }
        child_component_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
        sort_order: { type: integer }
        notes: { type: string, nullable: true }

    UpdateChildRequest:
      type: object
      description: Patch an existing edge. All fields optional.
      properties:
        quantity: { type: integer, minimum: 1 }
        sort_order: { type: integer }
        notes: { type: string, nullable: true }

    ModulePriceHistoryPoint:
      type: object
      required: [date, price]
      properties:
        date: { type: string, format: date }
        price:
          type: string
          description: Decimal as string; the module's `precio_total` at that date.

    ModulePriceHistoryResponse:
      type: object
      required: [period, points]
      properties:
        period: { type: string, enum: [week, month, year] }
        points:
          type: array
          items: { $ref: "#/components/schemas/ModulePriceHistoryPoint" }

    SupplierPurchaseSummary:
      type: object
      description: |
        Aggregated supplier spend across all descendant components of a module.
        Drives the "Proveedor más comprado" pane on the module detail / historial.
      required: [supplier_name, qty, cost]
      properties:
        supplier_id: { type: string, format: uuid, nullable: true }
        supplier_name: { type: string }
        qty: { type: integer, minimum: 0 }
        cost: { type: string, description: Decimal as string (EUR). }

    PaginatedStockEvents:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/StockEvent" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    SupplierPrice:
      type: object
      required: [id, component_id, supplier_id, qty_tier, price, valid_from]
      properties:
        id: { type: string, format: uuid }
        component_id: { type: string, format: uuid }
        supplier_id: { type: string, format: uuid }
        qty_tier: { type: integer, enum: [1, 10, 100, 1000] }
        price: { type: string, description: "Decimal as string, EUR" }
        valid_from: { type: string, format: date }

    SupplierStockSnapshot:
      type: object
      required: [id, component_id, supplier_id, quantity, snapshot_at]
      properties:
        id: { type: string, format: uuid }
        component_id: { type: string, format: uuid }
        supplier_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 0 }
        snapshot_at: { type: string, format: date }

    ComponentSummary:
      type: object
      description: Lightweight subset of Component embedded in cross-references (scoring alternatives, module children, etc.).
      required: [id, mpn, name, family, nato_score, tier, stock]
      properties:
        id: { type: string, format: uuid }
        mpn: { type: string }
        sku: { type: string, nullable: true }
        name: { type: string }
        family: { type: string }
        fabricante: { type: string, nullable: true }
        location: { type: string, nullable: true, maxLength: 100 }
        country_of_origin: { type: string, nullable: true, minLength: 2, maxLength: 2 }
        nato_score: { type: string, enum: ["A+", A, B, C, D, F] }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        stock: { type: integer, minimum: 0 }
        current_price_per_100_eur: { type: string, nullable: true }
        supplier_stock_summary:
          type: array
          description: Same shape and semantics as on `Component`.
          items:
            $ref: "#/components/schemas/SupplierStockSummaryEntry"

    ScoringClassification:
      type: object
      required: [id, nato_scoring_id, part_label, verificado, sort_order]
      properties:
        id: { type: string, format: uuid }
        nato_scoring_id: { type: string, format: uuid }
        part_label: { type: string }
        fabricante: { type: string, nullable: true }
        country_of_origin: { type: string, nullable: true, minLength: 2, maxLength: 2 }
        nato_score: { type: string, enum: ["A+", A, B, C, D, F], nullable: true }
        verificado: { type: boolean }
        notas: { type: string, nullable: true }
        reference_component_id: { type: string, format: uuid, nullable: true }
        reference_url: { type: string, nullable: true }
        sort_order: { type: integer, minimum: 0 }

    ScoringAlternative:
      type: object
      required: [id, nato_scoring_id, alternative_component_id, sort_order]
      properties:
        id: { type: string, format: uuid }
        nato_scoring_id: { type: string, format: uuid }
        alternative_component_id: { type: string, format: uuid }
        notes: { type: string, nullable: true }
        sort_order: { type: integer, minimum: 0 }
        alternative_component:
          allOf:
            - $ref: "#/components/schemas/ComponentSummary"
          nullable: true
          description: Hydrated server-side; null if the referenced component was deleted.

    NatoScoringSummary:
      type: object
      description: Scoring envelope without classifications/alternatives.
      required:
        [id, component_id, nato_score, tier, classified_at, expires_at, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        component_id: { type: string, format: uuid }
        nato_score: { type: string, enum: ["A+", A, B, C, D, F] }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        classified_at: { type: string, format: date }
        expires_at: { type: string, format: date }
        classified_by_user_id: { type: string, format: uuid, nullable: true }
        classified_by_full_name: { type: string, nullable: true }
        status: { type: string, enum: [active, archived] }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    NatoScoringResponse:
      allOf:
        - $ref: "#/components/schemas/NatoScoringSummary"
        - type: object
          properties:
            classifications:
              type: array
              items: { $ref: "#/components/schemas/ScoringClassification" }
            alternatives:
              type: array
              items: { $ref: "#/components/schemas/ScoringAlternative" }

    ClassificationInput:
      type: object
      required: [part_label]
      properties:
        part_label: { type: string, minLength: 1, maxLength: 200 }
        fabricante: { type: string, nullable: true }
        country_of_origin: { type: string, nullable: true, minLength: 2, maxLength: 2 }
        nato_score: { type: string, enum: ["A+", A, B, C, D, F], nullable: true }
        verificado: { type: boolean, default: false }
        notas: { type: string, nullable: true }
        reference_component_id: { type: string, format: uuid, nullable: true }
        reference_url: { type: string, nullable: true }

    AlternativeInput:
      type: object
      required: [alternative_component_id]
      properties:
        alternative_component_id: { type: string, format: uuid }
        notes: { type: string, nullable: true }

    CreateNatoScoringRequest:
      type: object
      required: [nato_score, tier]
      properties:
        nato_score: { type: string, enum: ["A+", A, B, C, D, F] }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        classified_at: { type: string, format: date, description: defaults to today }
        expires_at: { type: string, format: date, description: defaults to classified_at + 6 months }
        notes: { type: string, nullable: true }
        classifications:
          type: array
          items: { $ref: "#/components/schemas/ClassificationInput" }
        alternatives:
          type: array
          items: { $ref: "#/components/schemas/AlternativeInput" }

    ComponentSyncResponse:
      type: object
      deprecated: true
      description: Superseded — KiCAT/Holded sync ships in its own USs.
      required: [status]
      properties:
        status: { type: string, enum: [queued] }

    # ===== Projects + Customers =====

    ProjectStatus:
      type: string
      enum: [Presupuestado, Esperando, En proceso, Completado, Archivado]
      description: |
        Lifecycle status — DB-enforced (CHECK) and shared with the FE labels verbatim.
        Soft-delete transitions to `Archivado`. The PATCH endpoint auto-fills
        `fecha_entrega_real` with today's date when the status changes to
        `Completado` and the body does not provide an explicit value.

    Customer:
      type: object
      description: Id-link to Holded; the FE renders `holded_id` as a clickable badge.
      required: [id, holded_id, name, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        holded_id: { type: string, maxLength: 64 }
        name: { type: string, maxLength: 200 }
        holded_url: { type: string, nullable: true, maxLength: 500 }
        notas: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CustomerCreate:
      type: object
      required: [holded_id, name]
      properties:
        holded_id: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 200 }
        holded_url: { type: string, nullable: true, maxLength: 500 }
        notas: { type: string, nullable: true }

    CustomerUpdate:
      type: object
      properties:
        holded_id: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 200 }
        holded_url: { type: string, nullable: true, maxLength: 500 }
        notas: { type: string, nullable: true }

    Project:
      type: object
      description: Top of the asset tree. Soft-delete only (transition to Archivado).
      required: [id, code, name, status, tags, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        code: { type: string, maxLength: 40, description: "Surfaced in the UI as `Clave`." }
        name: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/ProjectStatus" }
        customer_id: { type: string, format: uuid, nullable: true }
        icon:
          type: string
          nullable: true
          maxLength: 8
          description: Single emoji char/cluster — rendered in the list row icon cell and detail header.
        color:
          type: string
          nullable: true
          maxLength: 7
          description: "Hex `#rrggbb`. Used as visual accent (10% bg on the emoji)."
        tags:
          type: array
          items: { type: string }
          description: Free-text labels (e.g. `power`, `motor`, `automotive`).
        version: { type: string, nullable: true, maxLength: 40 }
        fecha_inicio: { type: string, format: date, nullable: true }
        fecha_entrega_estimada: { type: string, format: date, nullable: true }
        fecha_entrega_real: { type: string, format: date, nullable: true }
        notas: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProjectSummary:
      type: object
      description: Project + server-computed aggregates + embedded customer summary.
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            customer:
              allOf:
                - $ref: "#/components/schemas/Customer"
              nullable: true
            precio_total:
              type: string
              nullable: true
              description: Decimal as string (EUR).
            aggregated_nato_score:
              type: string
              enum: ["A+", A, B, C, D, F]
              nullable: true
            aggregated_tier:
              type: integer
              enum: [1, 2, 3, 4]
              nullable: true
            aggregated_expires_at:
              type: string
              format: date
              nullable: true
            buildable_stock:
              type: integer
              minimum: 0

    ProjectChild:
      type: object
      description: |
        Project BOM edge. XOR — exactly one of `child_module_id` /
        `child_component_id` is non-null. Hydrated `child_module` /
        `child_component` summaries surface in `ProjectResponse.children`.
      required: [id, parent_project_id, quantity, sort_order]
      properties:
        id: { type: string, format: uuid }
        parent_project_id: { type: string, format: uuid }
        child_module_id: { type: string, format: uuid, nullable: true }
        child_component_id: { type: string, format: uuid, nullable: true }
        quantity: { type: integer, minimum: 1 }
        sort_order: { type: integer }
        notes: { type: string, nullable: true }
        child_module:
          allOf:
            - $ref: "#/components/schemas/ModuleSummary"
          nullable: true
        child_component:
          allOf:
            - $ref: "#/components/schemas/ComponentSummary"
          nullable: true

    ProjectResponse:
      type: object
      description: Detail bundle — ProjectSummary + hydrated children + interest links.
      allOf:
        - $ref: "#/components/schemas/ProjectSummary"
        - type: object
          required: [children, interest_links]
          properties:
            children:
              type: array
              items: { $ref: "#/components/schemas/ProjectChild" }
            interest_links:
              type: array
              items: { $ref: "#/components/schemas/ProjectInterestLink" }

    ProjectInterestLink:
      type: object
      description: |
        Sub-entity of `Project` — feeds the "Enlaces de interés" surface on both
        the detail and edit pages. CRUD is exposed via dedicated sub-resource
        endpoints (`/api/v1/projects/{id}/interest-links*`).
      required: [id, project_id, name, url, sort_order, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        name: { type: string, maxLength: 200 }
        url: { type: string, maxLength: 2000 }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProjectInterestLinkCreate:
      type: object
      required: [name, url]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        url: { type: string, minLength: 1, maxLength: 2000 }
        sort_order: { type: integer }

    ProjectInterestLinkUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        url: { type: string, minLength: 1, maxLength: 2000 }
        sort_order: { type: integer }

    PaginatedProjects:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ProjectSummary" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    ProjectCreate:
      type: object
      required: [code, name]
      properties:
        code: { type: string, minLength: 1, maxLength: 40 }
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/ProjectStatus" }
        customer_id: { type: string, format: uuid, nullable: true }
        icon: { type: string, nullable: true, maxLength: 8 }
        color: { type: string, nullable: true, maxLength: 7 }
        tags:
          type: array
          items: { type: string }
        version: { type: string, nullable: true, maxLength: 40 }
        fecha_inicio: { type: string, format: date, nullable: true }
        fecha_entrega_estimada: { type: string, format: date, nullable: true }
        fecha_entrega_real: { type: string, format: date, nullable: true }
        notas: { type: string, nullable: true }

    ProjectUpdate:
      type: object
      description: All fields optional; `code` IS mutable.
      properties:
        code: { type: string, minLength: 1, maxLength: 40 }
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/ProjectStatus" }
        customer_id: { type: string, format: uuid, nullable: true }
        icon: { type: string, nullable: true, maxLength: 8 }
        color: { type: string, nullable: true, maxLength: 7 }
        tags:
          type: array
          items: { type: string }
        version: { type: string, nullable: true, maxLength: 40 }
        fecha_inicio: { type: string, format: date, nullable: true }
        fecha_entrega_estimada: { type: string, format: date, nullable: true }
        fecha_entrega_real: { type: string, format: date, nullable: true }
        notas: { type: string, nullable: true }

    AddProjectChildRequest:
      type: object
      required: [quantity]
      properties:
        child_module_id: { type: string, format: uuid }
        child_component_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
        notes: { type: string, nullable: true }
        sort_order: { type: integer }

    UpdateProjectChildRequest:
      type: object
      properties:
        quantity: { type: integer, minimum: 1 }
        notes: { type: string, nullable: true }
        sort_order: { type: integer }

    ProjectPriceHistoryResponse:
      type: object
      required: [project_id, period, series]
      properties:
        project_id: { type: string, format: uuid }
        period: { type: string, enum: [week, month, year] }
        series:
          type: array
          items:
            type: object
            required: [date, price]
            properties:
              date: { type: string, format: date }
              price: { type: string }

    ConfigResponse:
      type: object
      required: [holded_base_url]
      properties:
        holded_base_url:
          type: string
          description: Built into the customer link (`${holded_base_url}/contact/{holded_id}`).

    # ---------- Supplier integration (change `supplier-sync`) ----------
    SupplierCode:
      type: string
      enum: [mouser, digikey, tme, farnell, rs]
    LookupFields:
      type: object
      description: >
        Merged "headline" view used to pre-fill the new-component form.
        Each field is the first non-null + non-empty value found in
        priority order across the consulted suppliers.
      properties:
        name: { type: string, nullable: true }
        description: { type: string, nullable: true }
        manufacturer: { type: string, nullable: true }
        family_hint: { type: string, nullable: true }
        datasheet_url: { type: string, nullable: true }
        package: { type: string, nullable: true }
        current_price_per_100_eur:
          type: number
          format: float
          nullable: true
          description: >
            EUR cost for 100 units, computed from the largest price break
            whose `quantity <= 100`. NULL when no supplier returned a
            qualifying break.
    SupplierPriceBreakResponse:
      type: object
      required: [quantity, price_original, currency_original]
      properties:
        quantity: { type: integer, minimum: 1 }
        price_original: { type: number, format: float }
        currency_original: { type: string, minLength: 3, maxLength: 3 }
        price_eur: { type: number, format: float, nullable: true }
    SupplierData:
      type: object
      required: [supplier]
      properties:
        supplier: { $ref: "#/components/schemas/SupplierCode" }
        supplier_sku: { type: string, nullable: true }
        supplier_product_url: { type: string, nullable: true }
        stock: { type: integer, nullable: true }
        price_breaks:
          type: array
          items: { $ref: "#/components/schemas/SupplierPriceBreakResponse" }
    LookupResponse:
      type: object
      required: [mpn, found, fields, supplier_data, sources_consulted, sources_succeeded, missing_fields]
      properties:
        mpn: { type: string }
        found: { type: boolean }
        fields: { $ref: "#/components/schemas/LookupFields" }
        supplier_data:
          type: array
          items: { $ref: "#/components/schemas/SupplierData" }
        sources_consulted:
          type: array
          items: { $ref: "#/components/schemas/SupplierCode" }
        sources_succeeded:
          type: array
          items: { $ref: "#/components/schemas/SupplierCode" }
        missing_fields:
          type: array
          items: { type: string }
    SyncRunStatus:
      type: string
      enum: [running, success, partial, failed]
    SyncErrorCode:
      type: string
      enum:
        - RATE_LIMITED
        - NOT_FOUND
        - HTTP_5XX
        - PARSE_ERROR
        - AUTH_FAILED
        - FX_UNAVAILABLE
        - TIMEOUT
        - UNKNOWN
    SupplierSyncRunResponse:
      type: object
      required: [id, supplier, started_at, components_processed, components_updated, errors_count, status]
      properties:
        id: { type: string, format: uuid }
        supplier: { $ref: "#/components/schemas/SupplierCode" }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time, nullable: true }
        components_processed: { type: integer, minimum: 0 }
        components_updated: { type: integer, minimum: 0 }
        errors_count: { type: integer, minimum: 0 }
        status: { $ref: "#/components/schemas/SyncRunStatus" }
        error_summary: { type: string, nullable: true }
    SupplierSyncErrorResponse:
      type: object
      required: [id, run_id, component_id, supplier, error_code, error_message, occurred_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        component_id: { type: string, format: uuid }
        supplier: { $ref: "#/components/schemas/SupplierCode" }
        error_code: { $ref: "#/components/schemas/SyncErrorCode" }
        error_message: { type: string }
        occurred_at: { type: string, format: date-time }
    TriggerSyncResponse:
      type: object
      required: [run_id, task_id]
      properties:
        run_id:
          type: string
          format: uuid
          description: ID of the `supplier_sync_runs` row created.
        task_id:
          type: string
          description: Celery task ID for stronger correlation.

  responses:
    Unauthorized:
      description: |
        Authentication failed. `code` is one of:
        `INVALID_CREDENTIALS`, `UNAUTHENTICATED`, `ACCESS_TOKEN_EXPIRED`,
        `ACCESS_TOKEN_WRONG_TYPE`, `ACCESS_TOKEN_MALFORMED`,
        `REFRESH_TOKEN_EXPIRED`, `REFRESH_TOKEN_REVOKED`,
        `REFRESH_TOKEN_MALFORMED`.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Validation:
      description: Pydantic validation error.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    RateLimited:
      description: Per-IP rate limit exceeded.
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ResetTokenInvalid:
      description: |
        Reset failed. `code` is one of `RESET_TOKEN_EXPIRED`,
        `RESET_TOKEN_ALREADY_USED`, `RESET_TOKEN_INVALID`.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ComponentNotFound:
      description: "Component not found (code: COMPONENT_NOT_FOUND)."
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
