name: ada_asm

services:
  postgres:
    image: postgres:16-alpine
    container_name: ada_asm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ada_asm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ada_asm}
      POSTGRES_DB: ${POSTGRES_DB:-ada_asm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ada_asm} -d ${POSTGRES_DB:-ada_asm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ada_asm_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ada_asm_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ada_asm}:${POSTGRES_PASSWORD:-ada_asm}@postgres:5432/${POSTGRES_DB:-ada_asm}
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ada_asm_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ada_asm}:${POSTGRES_PASSWORD:-ada_asm}@postgres:5432/${POSTGRES_DB:-ada_asm}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:-change-me-in-env}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      PASSWORD_MAX_LENGTH: ${PASSWORD_MAX_LENGTH:-128}
      CORS_ORIGINS: "http://localhost:${FRONTEND_PORT:-5173},http://*.local:${FRONTEND_PORT:-5173}"
      ENV: ${ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ada_asm_celery_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ada_asm}:${POSTGRES_PASSWORD:-ada_asm}@postgres:5432/${POSTGRES_DB:-ada_asm}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:-change-me-in-env}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      PASSWORD_MAX_LENGTH: ${PASSWORD_MAX_LENGTH:-128}
      CORS_ORIGINS: "http://localhost:${FRONTEND_PORT:-5173}"
      ENV: ${ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["celery", "-A", "app.infrastructure.celery_app", "worker", "-l", "info"]
    healthcheck:
      disable: true

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ada_asm_celery_beat
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ada_asm}:${POSTGRES_PASSWORD:-ada_asm}@postgres:5432/${POSTGRES_DB:-ada_asm}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:-change-me-in-env}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      PASSWORD_MAX_LENGTH: ${PASSWORD_MAX_LENGTH:-128}
      CORS_ORIGINS: "http://localhost:${FRONTEND_PORT:-5173}"
      ENV: ${ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command:
      ["celery", "-A", "app.infrastructure.celery_app", "beat", "-l", "info",
       "--schedule=/tmp/celerybeat-schedule"]
    healthcheck:
      disable: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_ENV: ${VITE_ENV:-development}
    container_name: ada_asm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres_data:
  redis_data:
