name: deploy-infra

# Manual ONLY. Infra changes never deploy on `push` so an accidental
# Bicep edit cannot brick production. The operator must:
#   1. Open Actions → deploy-infra → Run workflow.
#   2. Choose the environment.
#   3. Inspect the `what-if` output in the job summary.
#   4. Re-run with `apply=true` to actually deploy.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, prod]
        default: dev
      apply:
        description: "Actually apply the changes (default: false → what-if only)"
        required: true
        type: boolean
        default: false

concurrency:
  group: deploy-infra-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  preview-and-apply:
    name: ${{ github.event.inputs.apply == 'true' && 'apply' || 'what-if' }} → ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Compile Bicep
        run: az bicep build --file infra/azure/main.bicep

      - name: Resolve Postgres admin password from Key Vault
        id: secret
        run: |
          KV="kv-ada-asm-${{ github.event.inputs.environment }}"
          PW=$(az keyvault secret show --vault-name "$KV" --name postgres-admin-password --query value -o tsv)
          echo "::add-mask::$PW"
          echo "pg=$PW" >> "$GITHUB_OUTPUT"

      - name: what-if (always runs)
        id: whatif
        run: |
          set -euo pipefail
          RG="rg-ada-asm-${{ github.event.inputs.environment }}"
          {
            echo "## Bicep what-if for \`${{ github.event.inputs.environment }}\`"
            echo ""
            echo '```'
            az deployment group what-if \
              --resource-group "$RG" \
              --template-file infra/azure/main.bicep \
              --parameters infra/azure/parameters.${{ github.event.inputs.environment }}.bicepparam \
              --parameters postgresAdminPassword="${{ steps.secret.outputs.pg }}" \
              --no-pretty-print
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: apply
        if: ${{ github.event.inputs.apply == 'true' }}
        run: |
          RG="rg-ada-asm-${{ github.event.inputs.environment }}"
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/azure/main.bicep \
            --parameters infra/azure/parameters.${{ github.event.inputs.environment }}.bicepparam \
            --parameters postgresAdminPassword="${{ steps.secret.outputs.pg }}" \
            --query "properties.outputs"
