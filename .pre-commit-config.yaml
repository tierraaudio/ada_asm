repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-case-conflict

  # Backend (Python) — runs only on backend files
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        name: ruff (backend lint)
        args: [--fix]
        files: ^backend/.*\.py$
      - id: ruff-format
        name: ruff (backend format)
        files: ^backend/.*\.py$

  # Run mypy via the backend's own uv-managed venv (which has fastapi,
  # pydantic, structlog, etc. installed) so it sees the same packages as
  # local dev and CI.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (backend type check)
        language: system
        entry: bash -c 'cd backend && uv run --extra dev mypy app'
        pass_filenames: false
        files: ^backend/(app/.*\.py|pyproject\.toml|uv\.lock)$

  # Frontend (TS/React) — invoke the project's own pnpm + node_modules so
  # versions and plugin resolution match `frontend/package.json`. Pre-commit
  # passes paths relative to the repo root; we strip the `frontend/` prefix
  # before chdir into `frontend/` so eslint/prettier find their plugins via
  # the project's own node_modules.
  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        language: system
        entry: scripts/pre-commit/run-in-frontend.sh node_modules/.bin/eslint --max-warnings=0
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        require_serial: true
        pass_filenames: true

      - id: prettier
        name: prettier (frontend)
        language: system
        entry: scripts/pre-commit/run-in-frontend.sh node_modules/.bin/prettier --check
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md|yaml|yml)$
        exclude: ^frontend/pnpm-lock\.yaml$
        require_serial: true
        pass_filenames: true

      - id: tsc
        name: tsc --noEmit (frontend type check)
        language: system
        entry: bash -c 'cd frontend && node_modules/.bin/tsc --noEmit'
        pass_filenames: false
        files: ^frontend/(src/.*\.(ts|tsx)|tsconfig\.json)$

  # Docker / Compose lint (lightweight)
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.1-beta
    hooks:
      - id: hadolint-docker
        files: (^|/)Dockerfile$
